# Kubernetes Secrets (DO NOT COMMIT WITH REAL VALUES)
# Create with: kubectl create secret generic sonia-secrets --from-literal=gemini-api-key=YOUR_KEY

apiVersion: v1
kind: Secret
metadata:
  name: sonia-secrets
type: Opaque
stringData:
  gemini-api-key: "REPLACE_WITH_YOUR_GEMINI_API_KEY"
  # Add other secrets as needed
  # ga-measurement-id: "REPLACE_WITH_YOUR_GA_ID"
  # sentry-dsn: "REPLACE_WITH_YOUR_SENTRY_DSN"
