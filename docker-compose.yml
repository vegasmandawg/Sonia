version: '3.8'

services:
  sonia-ai:
    build:
      context: .
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_APP_ENV: production
    image: sonia-ai-companion:latest
    container_name: sonia-ai-companion
    ports:
      - "80:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    labels:
      - "com.sonia.description=Sonia AI Companion"
      - "com.sonia.version=1.0.0"
    networks:
      - sonia-network

networks:
  sonia-network:
    driver: bridge
